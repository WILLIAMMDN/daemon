<section class="empty-state" [class.empty-state--compact]="compacto" role="status">
  <span class="empty-state__icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M5 8.5h14v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-10Zm3-4h8a2 2 0 0 1 2 2v2H6v-2a2 2 0 0 1 2-2Zm1 9h6" />
    </svg>
  </span>
  <h3>{{ titulo }}</h3>
  <p>{{ descripcion }}</p>
  <div class="empty-state__actions">
    <ng-content></ng-content>
  </div>
</section>
