<section
  class="empty-state"
  [class.empty-state--compact]="compacto || tamano === 'compact'"
  [class.empty-state--mini]="tamano === 'mini'"
  [attr.aria-live]="anunciar ? 'polite' : 'off'"
  role="status"
>
  <nz-empty
    [nzNotFoundImage]="robot"
    [nzNotFoundContent]="contenido"
    [nzNotFoundFooter]="acciones"
  />

  <ng-template #robot>
    <div class="empty-state__art" aria-hidden="true">
      @if (imagenDisponible()) {
        <img
          [src]="imagen"
          alt=""
          width="1254"
          height="1254"
          loading="lazy"
          decoding="async"
          draggable="false"
          (error)="registrarImagenFallida()"
        >
      } @else {
        <span class="empty-state__fallback">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor">
            <rect x="9" y="12" width="30" height="25" rx="9" stroke-width="2.3" />
            <path d="M24 12V7m-3 0h6M16 25c1.7-3 4.3-3 6 0m4 0c1.7-3 4.3-3 6 0M20 31c2.4 2 5.6 2 8 0" stroke-linecap="round" stroke-width="2.3" />
          </svg>
        </span>
      }
    </div>
  </ng-template>

  <ng-template #contenido>
    <div class="empty-state__copy">
      <h3>{{ titulo }}</h3>
      <p>{{ descripcion }}</p>
    </div>
  </ng-template>

  <ng-template #acciones>
    <div class="empty-state__actions">
      <ng-content></ng-content>
    </div>
  </ng-template>
</section>
