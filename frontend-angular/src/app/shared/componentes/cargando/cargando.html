@if (compacto) {
  <div class="flex items-center justify-center gap-2 p-2 w-full h-full">
    <nz-spin nzSimple nzSize="small"></nz-spin>
    <span class="text-xs font-semibold text-slate-500 animate-pulse">{{ texto }}</span>
  </div>
} @else {
  <div class="flex flex-col gap-6 w-full p-4 md:p-6 animate-pulse">
    <!-- Header skeleton -->
    <div class="flex gap-4 items-center">
      <nz-skeleton-element nzType="avatar" [nzActive]="true" nzSize="large"></nz-skeleton-element>
      <div class="flex flex-col gap-2 w-1/3">
        <nz-skeleton-element nzType="input" [nzActive]="true" nzSize="small" class="w-full"></nz-skeleton-element>
        <nz-skeleton-element nzType="input" [nzActive]="true" nzSize="small" class="w-2/3"></nz-skeleton-element>
      </div>
    </div>
    <!-- Body skeleton -->
    <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 4 }" [nzTitle]="false"></nz-skeleton>
  </div>
}
