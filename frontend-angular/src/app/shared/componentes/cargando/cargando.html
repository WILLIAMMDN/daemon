@if (compacto) {
  <div class="loading-compact" role="status" aria-live="polite" aria-busy="true">
    <nz-spin nzSimple nzSize="small" aria-hidden="true"></nz-spin>
    <span>{{ texto }}</span>
  </div>
} @else if (tipo === 'dashboard') {
  <div class="dashboard-skeleton" role="status" aria-live="polite" aria-busy="true">
    <span class="loading-copy">{{ texto }}</span>
    <div class="skeleton-hero">
      <span class="skeleton-shape skeleton-avatar"></span>
      <div class="skeleton-copy">
        <span class="skeleton-shape skeleton-line skeleton-line--short"></span>
        <span class="skeleton-shape skeleton-line skeleton-line--title"></span>
        <span class="skeleton-shape skeleton-line"></span>
      </div>
      <span class="skeleton-shape skeleton-level"></span>
    </div>
    <div class="skeleton-stats">
      @for (item of [1, 2, 3, 4]; track item) {
        <span class="skeleton-shape skeleton-stat"></span>
      }
    </div>
    <div class="skeleton-cards">
      <span class="skeleton-shape skeleton-card skeleton-card--wide"></span>
      <span class="skeleton-shape skeleton-card"></span>
    </div>
  </div>
} @else {
  <div class="generic-skeleton" role="status" aria-live="polite" aria-busy="true">
    <span class="loading-copy">{{ texto }}</span>
    <div class="generic-heading">
      <span class="skeleton-shape skeleton-avatar"></span>
      <div class="skeleton-copy">
        <span class="skeleton-shape skeleton-line skeleton-line--title"></span>
        <span class="skeleton-shape skeleton-line skeleton-line--short"></span>
      </div>
    </div>
    <span class="skeleton-shape skeleton-block"></span>
  </div>
}
