<div
  class="route-progress"
  [class.route-progress--active]="navegando()"
  [attr.aria-hidden]="!navegando()"
  role="progressbar"
  aria-label="Abriendo módulo"
>
  <span></span>
</div>

<router-outlet />

<ngx-spinner
  bdColor="rgba(0, 0, 0, 0.8)"
  size="medium"
  color="#fff"
  type="square-jelly-box"
  [fullScreen]="true"
>
  <p style="color: white">Loading...</p>
</ngx-spinner>
