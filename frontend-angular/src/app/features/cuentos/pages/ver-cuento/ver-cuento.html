@if (cargando()) {
  <app-cargando class="w-full" texto="Cargando historia..."></app-cargando>
} @else if (error()) {
  <main class="student-module-page w-full max-w-3xl mx-auto p-4 md:p-8 flex justify-center">
    <div class="w-full bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
      <p class="text-sm font-bold text-red-700">{{ error() }}</p>
    </div>
  </main>
} @else if (datos(); as datosCuento) {
  <main class="student-module-page flex flex-col gap-6 max-w-[1400px] mx-auto w-full font-inter px-4 lg:px-8 pb-10">

    <app-cuento-hero 
      [datosCuento]="datosCuento"
      [esPropietario]="esPropietario()"
      [idCuento]="id"
      [guardado]="guardado()"
      (onCompartir)="copiarEnlace()"
      (onGuardar)="toggleGuardar()">
    </app-cuento-hero>

    <!-- Main Workspace (Grid) -->
    <div class="flex flex-col lg:grid lg:grid-cols-[1fr_340px] xl:grid-cols-[1fr_380px] gap-6 items-start w-full max-w-full">
      
      <!-- Lado Izquierdo: Cuento y Comentarios -->
      <div class="w-full flex flex-col gap-6 transition-all duration-300" [class.max-w-4xl]="modoLectura()" [class.mx-auto]="modoLectura()">
        
        <app-cuento-lectura
          [datosCuento]="datosCuento"
          [modoLectura]="modoLectura()"
          [escalaFuente]="escalaFuente()"
          [guardado]="guardado()"
          [miReaccion]="miReaccion()"
          (onToggleModoLectura)="toggleModoLectura()"
          (onCambiarFuente)="cambiarFuente($event)"
          (onReaccionar)="reaccionar($event)"
          (onGuardar)="toggleGuardar()"
          (onCompartir)="copiarEnlace()">
        </app-cuento-lectura>

        <app-cuento-comentarios
          [comentarios]="comentarios()"
          [miAvatar]="miAvatar()"
          [miId]="miId()"
          [enviandoComentario]="enviandoComentario()"
          (onEnviarComentario)="enviarComentario($event)"
          (onEditarComentario)="editarComentario($event)"
          (onEliminarComentario)="eliminarComentario($event)">
        </app-cuento-comentarios>

      </div>

      <!-- Lado Derecho: Sidebar UI Premium -->
      <app-cuento-sidebar
        class="w-full flex flex-col gap-5 sticky top-24 transition-opacity duration-300"
        [class.hidden]="modoLectura()"
        [class.opacity-0]="modoLectura()"
        [datosCuento]="datosCuento"
        [modoLectura]="modoLectura()"
        [tipAsistente]="tipAsistente()"
        [reaccionesCount]="reaccionesCount()"
        [miReaccion]="miReaccion()"
        [comentariosCount]="comentarios().length"
        (onReaccionar)="reaccionar($event)">
      </app-cuento-sidebar>

    </div>
  </main>
}
