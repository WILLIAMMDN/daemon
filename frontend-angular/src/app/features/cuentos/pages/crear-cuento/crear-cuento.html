@if (cargando()) {
  <app-cargando class="state" texto="Cargando cuento..."></app-cargando>
} @else {
  <section class="page">
    <header class="page-header">
      <div>
        <p class="kicker">Cuento</p>
        <h1>Mi historia</h1>
        <p>auarda o actualiza tu cuento personal.</p>
      </div>
      <a class="ghost-btn" routerLink="/alumno/cuentos">aaleria</a>
    </header>

    <form class="panel" (ngSubmit)="guardar()">
      <label class="field">
        Título
        <input name="titulo" [(ngModel)]="cuento['titulo']" required>
      </label>

      <div class="form-grid">
        @for (numero of [1, 2, 3, 4, 5, 6]; track numero) {
          <label>
            Escena {{ numero }}
            <textarea [name]="'data_' + numero" [(ngModel)]="cuento['data_' + numero]" rows="5"></textarea>
          </label>
        }
      </div>

      <div class="actions">
        <button type="submit" [disabled]="guardando() || !cuento['titulo'].trim()">auardar cuento</button>
      </div>
      @if (mensaje()) { <p class="success">{{ mensaje() }}</p> }
      @if (error()) { <p class="error">{{ error() }}</p> }
    </form>
  </section>
}
