<section class="card"><p class="eyebrow">Personalidad y conocimiento</p><h1>Configura tu bot</h1><form (ngSubmit)="guardar()"><label>Nombre<input name="nombre" [(ngModel)]="datos.nombre_bot" required></label><label>Personalidad<textarea name="prompt" [(ngModel)]="datos.system_prompt" rows="5" placeholder="Ejemplo: Eres un tutor paciente..."></textarea></label><label>Conocimiento especializado<textarea name="conocimiento" [(ngModel)]="datos.conocimiento" rows="8"></textarea></label><div><button>Guardar bot</button><a routerLink="/alumno/chatbot">Ir al chat</a></div>@if (mensaje()) { <p class="ok">{{ mensaje() }}</p> }@if (error()) { <p class="error">{{ error() }}</p> }</form></section>
