<section class="page">
  <header class="page-header">
    <div>
      <p class="kicker">Perfil docente</p>
      <h1>{{ sesion.usuario()?.nombre_completo || 'Docente' }}</h1>
      <p>{{ sesion.usuario()?.usuario }} - {{ sesion.usuario()?.rol }}</p>
    </div>
    <a class="btn" routerLink="/docente/alumnos">Gestionar alumnos</a>
  </header>

  <section class="stats">
    <article class="stat">
      <span>Nivel</span>
      <strong>{{ sesion.usuario()?.nivel || '-' }}</strong>
    </article>
    <article class="stat">
      <span>Tokens</span>
      <strong>{{ sesion.usuario()?.tokens || 0 }}</strong>
    </article>
  </section>
</section>
