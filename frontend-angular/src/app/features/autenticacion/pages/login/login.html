<main class="auth-shell">
  <section class="auth-card">
    <a class="brand" routerLink="/">YachayIA</a>
    <p class="eyebrow">Aula rural con inteligencia artificial</p>
    <h1>Bienvenido de vuelta</h1>
    <p class="intro">Ingresa con tu usuario de estudiante o docente.</p>
    <form (ngSubmit)="entrar()">
      <label>Usuario<input name="usuario" [(ngModel)]="usuario" required autocomplete="username"></label>
      <label>Contrasena<input name="password" [(ngModel)]="password" required type="password" autocomplete="current-password"></label>
      @if (error()) { <p class="error">{{ error() }}</p> }
      <button type="submit" [disabled]="enviando()">{{ enviando() ? 'Ingresando...' : 'Ingresar' }}</button>
    </form>
    <div class="links"><a routerLink="/registro">Crear cuenta</a><a routerLink="/recuperar-clave">Recuperar clave</a></div>
  </section>
</main>
