<main class="min-h-screen flex items-center justify-center bg-white">
  <section class="w-full max-w-4xl mx-4 lg:mx-8 grid lg:grid-cols-2 gap-6 items-center">

    <!-- Left: Visual -->
    <div class="hidden lg:flex bg-[#0b1220] rounded-2xl overflow-hidden relative h-[540px]">
      <div class="absolute inset-0 opacity-30 bg-gradient-to-br from-[#07122a] via-[#0f2a4a] to-transparent"></div>
      <div class="p-8 z-10 self-end text-white">
        <h2 class="text-3xl font-black mb-2">Recupera tu acceso</h2>
        <p class="text-sm text-slate-200 max-w-xs">Sigue el proceso seguro y recupera tu cuenta en pocos minutos.</p>
      </div>
      <div class="absolute inset-0">
        <spline-viewer url="https://prod.spline.design/nMNnp2Qj0GPfUDUz/scene.splinecode" style="width:100%;height:100%;background:transparent"></spline-viewer>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="bg-white rounded-2xl shadow-lg p-8 lg:p-12">
      <a class="text-sm text-slate-500 hover:underline" routerLink="/">&larr; Volver</a>
      <h1 class="text-2xl font-extrabold text-slate-900 mt-4 mb-2">Recuperar acceso</h1>
      <p class="text-sm text-slate-600 mb-6">Ingresa tu usuario o correo electrónico y te enviaremos instrucciones seguras.</p>

      <div class="flex w-full mb-4 justify-center">
        <div class="w-full max-w-xs flex justify-center">
          <asl-google-signin-button type="standard" size="large"></asl-google-signin-button>
        </div>
      </div>

      <div *ngIf="googleEmail()" class="mt-4 p-3 rounded-md border border-slate-200/10 bg-slate-50/5">
        <p class="text-sm">Cuenta detectada: <strong class="text-slate-200">{{ googleEmail() }}</strong></p>
        <div class="mt-3 flex gap-2">
          <button hlmBtn (click)="enviarCodigoGoogle()" [disabled]="enviando()" class="px-4 py-2">Enviar código al correo de Google</button>
          <button hlmBtn variant="ghost" (click)="googleEmail.set(null)" class="px-4 py-2">Usar otra dirección</button>
        </div>
      </div>

      <div class="flex items-center my-4" aria-hidden="true">
        <span class="flex-1 h-px bg-slate-300/40"></span>
        <span class="mx-3 text-sm text-slate-500">o</span>
        <span class="flex-1 h-px bg-slate-300/40"></span>
      </div>

      <form #recForm="ngForm" (ngSubmit)="solicitar(recForm)" class="space-y-4" novalidate>

        <div class="space-y-1">
          <label hlmLabel class="text-sm font-semibold text-slate-700">Usuario</label>
          <input hlmInput name="usuario" [(ngModel)]="datos.usuario" #usuarioModel="ngModel" class="w-full" placeholder="Ingresa tu usuario">
        </div>

        <div class="space-y-1">
          <label hlmLabel class="text-sm font-semibold text-slate-700">Correo electrónico</label>
          <input hlmInput name="email" [(ngModel)]="datos.email" type="email" #emailModel="ngModel" class="w-full" placeholder="tu@correo.com">
        </div>

        <div *ngIf="mensaje()" class="p-3 rounded-md bg-green-50 text-green-700 border border-green-100 text-sm">{{ mensaje() }}</div>
        <div *ngIf="error()" class="p-3 rounded-md bg-red-50 text-red-700 border border-red-100 text-sm">{{ error() }}</div>

        <div class="pt-2">
          <button hlmBtn type="submit" [disabled]="enviando()" class="w-full h-12 flex items-center justify-center">
            {{ enviando() ? 'Enviando...' : 'Solicitar recuperación' }}
          </button>
        </div>

        <div class="text-center text-sm text-slate-500 mt-3">
          <a routerLink="/login" class="underline">Iniciar sesión</a>
        </div>
      </form>
    </div>

  </section>
</main>
