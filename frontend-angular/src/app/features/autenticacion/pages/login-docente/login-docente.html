<main class="min-h-screen flex items-center justify-center bg-slate-50 font-nunito p-4 relative overflow-hidden">
  <div class="absolute top-0 w-full h-[400px] bg-gradient-to-b from-[#15326b]/10 to-transparent pointer-events-none"></div>

  <section class="w-full max-w-[420px] bg-white border border-slate-200 rounded-2xl shadow-xl relative z-10 overflow-hidden">
    <div class="flex flex-col space-y-1.5 p-6 sm:p-8 text-center border-b border-slate-100 bg-slate-50/50 relative">
      <a routerLink="/" class="text-2xl font-black text-[#15326b] tracking-tighter mb-2">DAEMON</a>
      <a routerLink="/" class="absolute left-4 top-4 inline-flex items-center gap-2 px-3 py-2 bg-white border border-slate-200 rounded-full text-sm font-semibold text-slate-700 hover:bg-slate-50 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M4 10v10a1 1 0 001 1h3m10-11v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
        Volver
      </a>
      <h1 class="font-semibold tracking-tight text-2xl text-slate-900">Ingreso Docente</h1>
      <p class="text-sm text-slate-500">Ingresa con tu usuario docente</p>
    </div>

    <div class="p-6 sm:p-8">
      <div class="flex justify-center w-full mb-6">
        <asl-google-signin-button type="standard" size="large"></asl-google-signin-button>
      </div>

      <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center">
          <span class="w-full border-t border-slate-200"></span>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="bg-white px-2 text-slate-400 font-semibold tracking-wider">O utiliza tu usuario</span>
        </div>
      </div>

      <form #docenteForm="ngForm" (ngSubmit)="entrar(docenteForm)" class="space-y-4" novalidate>
        <div class="space-y-2 text-left">
          <label class="text-sm font-semibold leading-none text-slate-700" for="usuario">Usuario</label>
          <input id="usuario" name="usuario" [(ngModel)]="usuario" required minlength="4" #usuarioModel="ngModel" autocomplete="username" class="flex h-10 w-full rounded-md border border-slate-300 bg-transparent px-3 py-2 text-sm placeholder:text-slate-400 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#15326b] transition-all" placeholder="Usuario docente">
          <p *ngIf="usuarioModel.invalid && (usuarioModel.dirty || usuarioModel.touched)" class="text-xs text-red-600">El usuario es obligatorio y debe tener al menos 4 caracteres.</p>
        </div>

        <div class="space-y-2 text-left">
          <div class="flex justify-between items-center">
            <label class="text-sm font-semibold leading-none text-slate-700" for="password">Contraseña</label>
          </div>
          <input type="password" id="password" name="password" [(ngModel)]="password" required minlength="6" #passwordModel="ngModel" autocomplete="current-password" class="flex h-10 w-full rounded-md border border-slate-300 bg-transparent px-3 py-2 text-sm placeholder:text-slate-400 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#15326b] transition-all" placeholder="••••••••">
          <p *ngIf="passwordModel.invalid && (passwordModel.dirty || passwordModel.touched)" class="text-xs text-red-600">La contraseña es obligatoria y debe tener al menos 6 caracteres.</p>
        </div>

        @if (error()) {
          <div class="p-3 rounded-md bg-red-50 border border-red-200 text-sm font-medium text-red-600 text-center">
            {{ error() }}
          </div>
        }

        <button type="submit" [disabled]="enviando() || docenteForm.invalid" class="inline-flex items-center justify-center rounded-md text-sm font-bold focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-900 bg-[#15326b] text-white hover:bg-[#15326b]/90 h-10 px-4 py-2 w-full mt-2 transition-colors shadow-sm disabled:opacity-70 disabled:cursor-not-allowed">
          {{ enviando() ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    </div>

    <div class="p-5 text-center border-t border-slate-100 bg-slate-50/50">
      <p class="text-sm text-slate-600">¿Eres estudiante? <a routerLink="/login" class="text-[#15326b] hover:underline font-bold transition-colors">Ingresa aquí</a></p>
    </div>
  </section>
</main>
