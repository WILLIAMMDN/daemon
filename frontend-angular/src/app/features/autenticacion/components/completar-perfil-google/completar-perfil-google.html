<div class="profile-overlay" role="dialog" aria-modal="true" aria-labelledby="google-profile-title">
  <section class="profile-dialog">
    <div class="dialog-accent" aria-hidden="true"></div>

    <header class="dialog-head">
      <div class="google-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" focusable="false">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5Z" />
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65Z" />
          <path fill="#FBBC05" d="M10.53 28.59A14.45 14.45 0 0 1 10.53 19.41l-7.98-6.19A24 24 0 0 0 2.55 34.78l7.98-6.19Z" />
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48Z" />
          <path fill="none" d="M0 0h48v48H0z" />
        </svg>
      </div>
      <div>
        <p class="eyebrow">Acceso seguro</p>
        <h2 id="google-profile-title">Completa tu perfil</h2>
      </div>
    </header>

    <p class="dialog-copy">
      Escribe los datos con los que quieres aparecer dentro de DAEMON. Tu correo de acceso queda protegido y no se cambia desde aqui.
    </p>

    @if (correoGoogle) {
      <div class="verified-email">
        <span>Correo verificado</span>
        <strong>{{ correoGoogle }}</strong>
      </div>
    }

    <form #perfilForm="ngForm" (ngSubmit)="guardar(perfilForm)" class="profile-form" autocomplete="off" novalidate>
      <label class="classic-field" for="google_nombre_completo">
        <span class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z" />
          </svg>
        </span>
        <input
          id="google_nombre_completo"
          name="nombre_completo"
          [(ngModel)]="datos.nombre_completo"
          required
          [minlength]="nombreMinLength"
          autocomplete="off"
          placeholder="Nombre completo"
        >
      </label>

      <label class="classic-field" for="google_usuario">
        <span class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M12 2a7 7 0 0 0-7 7v2a7 7 0 0 0 14 0V9a7 7 0 0 0-7-7Zm0 16c-3.31 0-6 1.57-6 3.5V22h12v-.5c0-1.93-2.69-3.5-6-3.5Zm3-8H9V8h6Z" />
          </svg>
        </span>
        <input
          id="google_usuario"
          name="usuario"
          [(ngModel)]="datos.usuario"
          required
          [minlength]="usuarioMinLength"
          pattern="[A-Za-z0-9_-]+"
          autocomplete="off"
          placeholder="Usuario"
        >
      </label>

      <label class="classic-field" for="google_nivel">
        <span class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M12 3 1 9l11 6 9-4.91V17h2V9Zm0 14.3L5 13.48V17c0 1.66 3.13 3 7 3s7-1.34 7-3v-3.52Z" />
          </svg>
        </span>
        <select id="google_nivel" name="nivel" [(ngModel)]="datos.nivel" required>
          <option value="KIDS">KIDS</option>
          <option value="TEENS">TEENS</option>
          <option value="PRO">PRO</option>
        </select>
      </label>

      @if (error()) {
        <div class="form-alert" role="alert">{{ error() }}</div>
      }

      <div class="dialog-actions">
        <button type="button" class="secondary-button" (click)="cancelar()" [disabled]="guardando()">
          Usar otra cuenta
        </button>
        <button type="submit" class="submit-button" [disabled]="guardando() || perfilForm.invalid">
          {{ guardando() ? 'Guardando...' : 'Entrar a DAEMON' }}
        </button>
      </div>
    </form>
  </section>
</div>
