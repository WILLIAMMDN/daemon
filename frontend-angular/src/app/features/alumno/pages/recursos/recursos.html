<main class="student-module-page w-full max-w-7xl mx-auto p-4 md:p-6 lg:p-8 flex flex-col gap-6 md:gap-8 font-inter">
  <header class="student-module-header flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white border border-slate-200 shadow-sm rounded-2xl p-6">
    <div class="flex flex-col gap-1">
      <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Recursos</p>
      <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 leading-tight">Accesos de aprendizaje</h1>
      <p class="text-sm text-slate-600">Herramientas activas de tu cuenta.</p>
    </div>
  </header>

  <!-- CATÁLOGO AUTO-GRID -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 w-full">
    @for (recurso of recursos; track recurso.ruta) {
      <article class="flex flex-col gap-3 bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow duration-300 h-full">
        <h2 class="text-lg font-bold text-slate-900 leading-tight">{{ recurso.titulo }}</h2>
        <p class="text-sm text-slate-600 leading-relaxed flex-grow">{{ recurso.detalle }}</p>
        
        <div class="mt-4 pt-4 border-t border-slate-100">
          <a nz-button nzType="primary" class="daemon-btn w-full" [routerLink]="recurso.ruta">Abrir</a>
        </div>
      </article>
    }
  </div>
</main>
