<section class="page">
  <header class="page-header">
    <div>
      <p class="kicker">Recursos</p>
      <h1>Accesos de aprendizaje</h1>
      <p>Herramientas activas de tu cuenta.</p>
    </div>
  </header>

  <div class="card-list">
    @for (recurso of recursos; track recurso.ruta) {
      <article class="data-card">
        <h2>{{ recurso.titulo }}</h2>
        <p>{{ recurso.detalle }}</p>
        <a class="btn" [routerLink]="recurso.ruta">Abrir</a>
      </article>
    }
  </div>
</section>
