@if (cargando()) {
  <app-cargando class="state" texto="Cargando datos..."></app-cargando>
} @else {
  <section class="page">
    <header class="page-header">
      <div>
        <p class="kicker">Perfil</p>
        <h1>Editar mis datos</h1>
        <p>Actualiza la información que aparece en tu cuenta de DAEMON.</p>
      </div>
      <a class="ghost-btn" routerLink="/alumno/perfil">Volver</a>
    </header>

    <form class="panel" (ngSubmit)="guardar()">
      <div class="form-grid">
        <label>
          Nombre completo
          <input name="nombre_completo" [(ngModel)]="formulario.nombre_completo" required>
        </label>
        <label>
          Correo
          <input name="email" [(ngModel)]="formulario.email" type="email">
        </label>
        <label>
          Genero
          <input name="genero" [(ngModel)]="formulario.genero">
        </label>
        <label class="field-wide">
          Biografía
          <textarea name="biografia" [(ngModel)]="formulario.biografia" rows="5"></textarea>
        </label>
      </div>

      <div class="actions">
        <button type="submit" [disabled]="guardando()">Guardar cambios</button>
        <button type="button" (click)="cargar()">Restaurar</button>
      </div>

      @if (mensaje()) { <p class="success">{{ mensaje() }}</p> }
      @if (error()) { <p class="error">{{ error() }}</p> }
    </form>
  </section>
}
