<section class="page training-page">
  <header class="page-header">
    <div>
      <p class="kicker">Entrenamiento</p>
      <h1>Mascota Ib</h1>
      <p>Índice del laboratorio para revisar cerebro, laberinto y defensa.</p>
    </div>
    <div class="actions">
      <a class="ghost-btn" routerLink="/alumno/herramientas/laboratorio">Cerebro IA</a>
    </div>
  </header>

  <section class="card-list">
    @for (motor of motores; track motor.ruta) {
      <article class="data-card motor-card">
        <span class="badge" [class.warn]="motor.estado !== 'Conectado'">{{ motor.estado }}</span>
        <h2>{{ motor.titulo }}</h2>
        <p>{{ motor.detalle }}</p>
        <a class="btn" [routerLink]="motor.ruta">Abrir módulo</a>
      </article>
    }
  </section>
</section>
