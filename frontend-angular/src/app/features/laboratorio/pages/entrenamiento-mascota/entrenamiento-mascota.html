<section class="page">
  <header class="page-header">
    <div>
      <p class="kicker">Entrenamiento</p>
      <h1>Mascota IA</h1>
      <p>Accesos conectados al cerebro y motores de aprendizaje.</p>
    </div>
  </header>

  <div class="card-list">
    @for (motor of motores; track motor.ruta) {
      <article class="data-card">
        <h2>{{ motor.titulo }}</h2>
        <a class="btn" [routerLink]="motor.ruta">Abrir</a>
      </article>
    }
  </div>
</section>
