<section class="page">
  <header class="page-header">
    <div>
      <p class="kicker">Defensa IA</p>
      <h1>Motor de defensa</h1>
      <p>Assets heredados listos para conectar a una vista interactiva.</p>
    </div>
  </header>

  <div class="card-list">
    @for (archivo of archivos; track archivo.ruta) {
      <article class="data-card">
        <h2>{{ archivo.nombre }}</h2>
        <a class="btn" [href]="archivo.ruta" target="_blank">Abrir archivo</a>
      </article>
    }
  </div>
</section>
