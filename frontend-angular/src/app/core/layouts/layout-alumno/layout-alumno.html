<div
  class="portal student-premium"
  [attr.data-nivel-alumno]="temaPortal().atributo"
  [style.--student-primary]="temaPortal().colorPrincipal"
  [style.--student-primary-dark]="temaPortal().colorPrincipalOscuro"
  [style.--student-primary-soft]="temaPortal().colorSuave"
  [style.--student-primary-border]="temaPortal().colorBorde"
>
  <app-sidebar-portal
    #sidebar
    ariaLabel="Navegación de estudiante"
    brandDetalle="Academy"
    homeLink="/alumno"
    modo="alumno"
    rol="Estudiante"
    storageKey="daemon_sidebar_alumno_colapsado"
    [perfilAvatar]="avatarUrl()"
    [perfilEmail]="sesion.usuario()?.email || ''"
    [perfilNombre]="sesion.usuario()?.nombre_completo || sesion.usuario()?.usuario || 'Cuenta activa'"
    [perfilUsuario]="sesion.usuario()?.usuario || ''"
    [perfilNivel]="perfilNivel()"
    [perfilTokens]="perfilTokens()"
    [secciones]="seccionesSidebar"
    (logout)="salir()"
  />

  <section class="workspace">
    <app-email-verification-banner />

    <app-topbar-alumno
      (abrirMenuMovil)="sidebar.abrirMovil()"
      (logout)="salir()"
    />

    @if (bienestar()?.bloqueado) {
      <main class="content-area pb-24 md:pb-0">
        <section class="digital-pause" role="alert" aria-live="assertive">
          <span><fa-icon [icon]="iconos.descanso" /></span>
          <p>Bienestar digital</p>
          <h1>Tu Núcleo DAEMON también necesita descansar</h1>
          <strong>{{ bienestar()?.mensaje }}</strong>
          <small>Tu XP, misiones y avances están guardados. Podrás continuar cuando termine la pausa familiar.</small>
        </section>
      </main>
    } @else {
      <main class="content-area pb-24 md:pb-0">
        <router-outlet />
      </main>
    }
  </section>

  <nav class="mobile-tabbar" aria-label="Navegación rápida">
    <a routerLink="/alumno" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <fa-icon [icon]="iconos.inicio" /><span>Inicio</span>
    </a>
    <a routerLink="/alumno/misiones" routerLinkActive="active">
      <fa-icon [icon]="iconos.misiones" /><span>Misiones</span>
    </a>
    <a routerLink="/alumno/tienda" routerLinkActive="active" class="store-tab">
      <span class="store-tab-icon"><fa-icon [icon]="iconos.tienda" /></span><span>Tienda</span>
    </a>
    <a routerLink="/alumno/ranking" routerLinkActive="active">
      <fa-icon [icon]="iconos.ranking" /><span>Ranking</span>
    </a>
    <a routerLink="/alumno/perfil" routerLinkActive="active">
      <fa-icon [icon]="iconos.perfil" /><span>Perfil</span>
    </a>
  </nav>
</div>
