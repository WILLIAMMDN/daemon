<div class="portal">
  <app-sidebar-portal
    ariaLabel="Navegacion de estudiante"
    brandDetalle="Academy"
    homeLink="/alumno"
    modo="alumno"
    rol="Estudiante"
    storageKey="daemon_sidebar_alumno_colapsado"
    [perfilAvatar]="avatarUrl()"
    [perfilEmail]="sesion.usuario()?.email || ''"
    [perfilNombre]="sesion.usuario()?.nombre_completo || sesion.usuario()?.usuario || 'Cuenta activa'"
    [perfilUsuario]="sesion.usuario()?.usuario || ''"
    [perfilNivel]="perfilNivel()"
    [perfilTokens]="perfilTokens()"
    [secciones]="seccionesSidebar"
    (logout)="salir()"
  />

  <section class="workspace">
    <app-email-verification-banner />

    <header class="topbar">
      <label class="topbar-search">
        <fa-icon [icon]="iconos.buscar" aria-hidden="true" />
        <input type="search" placeholder="Buscar cursos, retos, proyectos..." aria-label="Buscar cursos, retos o proyectos" />
      </label>

      <div class="topbar-actions">
        <button class="topbar-bell" type="button" aria-label="Notificaciones">
          <fa-icon [icon]="iconos.campana" />
          <span aria-hidden="true">2</span>
        </button>

        <a class="topbar-rank" routerLink="/alumno/perfil">
          <span class="rank-icon"><fa-icon [icon]="iconos.rango" /></span>
          <span>{{ sesion.usuario()?.rango || 'Explorador' }}</span>
          <app-moneda-daemon [size]="20" [cantidad]="perfilTokens()" titulo="DAEMONS disponibles" />
          <fa-icon class="rank-chevron" [icon]="iconos.desplegar" />
        </a>
      </div>
    </header>

    <main class="content-area">
      <router-outlet />
    </main>
  </section>
</div>
