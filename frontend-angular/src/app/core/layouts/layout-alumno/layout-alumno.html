<div
  class="portal student-premium"
  [attr.data-nivel-alumno]="temaPortal().atributo"
  [style.--student-primary]="temaPortal().colorPrincipal"
  [style.--student-primary-dark]="temaPortal().colorPrincipalOscuro"
  [style.--student-primary-soft]="temaPortal().colorSuave"
  [style.--student-primary-border]="temaPortal().colorBorde"
>
  <app-sidebar-portal
    #sidebar
    ariaLabel="Navegación de estudiante"
    brandDetalle="Academy"
    homeLink="/alumno"
    modo="alumno"
    rol="Estudiante"
    storageKey="daemon_sidebar_alumno_colapsado"
    [secciones]="seccionesSidebar"
    (logout)="salir()"
  />

  <section class="workspace">
    <app-email-verification-banner />

    <app-topbar-alumno
      (abrirMenuMovil)="sidebar.abrirMovil()"
      (logout)="salir()"
    />

    @if (bienestar()?.bloqueado) {
      <main class="content-area">
        <section class="digital-pause" role="alert" aria-live="assertive">
          <span><fa-icon [icon]="iconos.descanso" /></span>
          <p>Bienestar digital</p>
          <h1>Tu Núcleo DAEMON también necesita descansar</h1>
          <strong>{{ bienestar()?.mensaje }}</strong>
          <small>Tu XP, misiones y avances están guardados. Podrás continuar cuando termine la pausa familiar.</small>
        </section>
      </main>
    } @else {
      <main class="content-area">
        <router-outlet />
      </main>
    }
  </section>
</div>
