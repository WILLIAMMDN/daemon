<div class="portal">
  <app-sidebar-portal
    ariaLabel="Navegación de estudiante"
    brandDetalle="Academia IA"
    homeLink="/alumno"
    modo="alumno"
    rol="Estudiante"
    storageKey="daemon_sidebar_alumno_colapsado"
    [perfilDetalle]="perfilDetalle()"
    [perfilNombre]="sesion.usuario()?.nombre_completo || sesion.usuario()?.usuario || 'Cuenta activa'"
    [secciones]="seccionesSidebar"
    (logout)="salir()"
  />

  <section class="workspace">
    <app-email-verification-banner />

    <header class="topbar">
      <div>
        <span>Portal estudiante</span>
        <strong>{{ sesion.usuario()?.usuario || sesion.usuario()?.nombre_completo }}</strong>
      </div>
      <button type="button" (click)="salir()">Cerrar sesión</button>
    </header>

    <main class="content-area">
      <router-outlet />
    </main>
  </section>
</div>
