<div class="portal">
  <app-sidebar-portal
    ariaLabel="Navegación de docente"
    brandDetalle="Panel docente"
    homeLink="/docente"
    modo="docente"
    rol="Docente"
    storageKey="daemon_sidebar_docente_colapsado"
    [perfilAvatar]="avatarUrl()"
    [perfilDetalle]="perfilDetalle()"
    [perfilEmail]="sesion.usuario()?.email || ''"
    [perfilNombre]="sesion.usuario()?.nombre_completo || sesion.usuario()?.usuario || 'Cuenta activa'"
    [secciones]="seccionesSidebar"
    (logout)="salir()"
  />

  <section class="workspace">
    <app-email-verification-banner />

    <header class="topbar">
      <div class="topbar-user">
        <nz-badge [nzDot]="sesion.usuario()?.email_verificado === false" nzStatus="warning" nzTitle="Correo pendiente de verificación">
          <nz-avatar class="daemon-avatar" [nzSize]="44" [nzSrc]="avatarUrl() || undefined" [nzText]="iniciales()"></nz-avatar>
        </nz-badge>
        <div>
          <span>Portal docente</span>
          <strong>{{ sesion.usuario()?.usuario || sesion.usuario()?.nombre_completo }}</strong>
          <small>{{ perfilDetalle() }}</small>
        </div>
      </div>
      <button nz-button nzType="default" class="daemon-btn topbar-logout" type="button" (click)="salir()">Cerrar sesión</button>
    </header>

    <main class="content-area">
      <router-outlet />
    </main>
  </section>
</div>
