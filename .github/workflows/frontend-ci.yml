name: Frontend CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-angular
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Unit tests and coverage threshold
        run: npm run test:ci
      - name: Production build
        run: npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Public end-to-end smoke
        run: npm run e2e:public
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: frontend-angular/playwright-report
          retention-days: 7

