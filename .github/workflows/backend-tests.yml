name: Backend Tests (Laravel)

on:
  push:
    branches:
      - main
    paths:
      - 'backend-laravel/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend-laravel/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend-laravel

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: daemon_test
          POSTGRES_USER: daemon
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_pgsql, pgsql
          coverage: none

      - name: Install dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: daemon_test
          DB_USERNAME: daemon
          DB_PASSWORD: password
        run: php artisan migrate --env=testing --force

      - name: Execute tests via Artisan
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: daemon_test
          DB_USERNAME: daemon
          DB_PASSWORD: password
        run: php artisan test
