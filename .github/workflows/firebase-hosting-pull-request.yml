name: Deploy to Firebase Hosting on PR

on:
  pull_request:

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: |
          set +e
          npm ci --ignore-scripts --no-audit --no-fund 2>&1 | tee npm-install.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            echo "npm ci failed; retrying with npm install for this CI runner." | tee -a npm-install.log
            npm install --ignore-scripts --no-audit --no-fund 2>&1 | tee -a npm-install.log
            status=${PIPESTATUS[0]}
          fi

          if [ "$status" -ne 0 ]; then
            tail -n 120 npm-install.log \
              | perl -pe 's/\e\[[0-9;]*[mK]//g' \
              | sed -E 's/[A-Za-z0-9_\/+=-]{120,}/[redacted]/g' \
              > npm-install-tail.log

            message=$(tr '\n' ' ' < npm-install-tail.log | cut -c1-6000)
            echo "::error title=NPM install failed::$message"
            exit "$status"
          fi
        working-directory: frontend-angular

      - name: Test frontend
        run: npm test -- --runInBand
        working-directory: frontend-angular

      - name: Build frontend
        run: npm run build
        working-directory: frontend-angular

      - name: Configure Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DAEMON_A41F8 }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy preview to Firebase Hosting
        shell: bash
        run: |
          set +e
          npx firebase-tools@latest hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project daemon-a41f8 --only estudiante --expires 7d --non-interactive 2>&1 | tee firebase-deploy.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            if grep -q 'is the current active version' firebase-deploy.log; then
              echo "Firebase Hosting preview already serves this exact version; treating no-op deploy as success."
              exit 0
            fi

            grep -v '^npm warn' firebase-deploy.log \
              | tail -n 120 \
              | perl -pe 's/\e\[[0-9;]*[mK]//g' \
              | sed -E 's/[A-Za-z0-9_\/+=-]{120,}/[redacted]/g' \
              > firebase-deploy-tail.log

            {
              echo "Firebase preview deploy failed. Last sanitized lines:"
              echo '```'
              cat firebase-deploy-tail.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            message=$(tr '\n' ' ' < firebase-deploy-tail.log | cut -c1-6000)
            echo "::error title=Firebase preview deploy failed::$message"
            exit "$status"
          fi
