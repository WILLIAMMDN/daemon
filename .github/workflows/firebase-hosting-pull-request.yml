name: Deploy to Firebase Hosting on PR

on:
  pull_request:

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Pin npm version
        run: npm install --global npm@11.16.0 --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: frontend-angular

      - name: Audit frontend dependencies
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend-angular

      - name: Test frontend
        run: npm run test:ci
        working-directory: frontend-angular

      - name: Build frontend
        run: npm run build
        working-directory: frontend-angular

      - name: Authenticate to Google Cloud with OIDC
        if: ${{ vars.GCP_WIF_PROVIDER != '' && vars.GCP_DEPLOY_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Configure Firebase JSON credentials fallback
        if: ${{ vars.GCP_WIF_PROVIDER == '' || vars.GCP_DEPLOY_SERVICE_ACCOUNT == '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DAEMON_A41F8 }}
        run: |
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON" || { echo 'Missing Firebase credentials'; exit 1; }
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy preview to Firebase Hosting
        shell: bash
        run: |
          set +e
          npx firebase-tools@15.22.3 hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project daemon-a41f8 --only estudiante --expires 7d --non-interactive 2>&1 | tee firebase-deploy.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            if grep -q 'is the current active version' firebase-deploy.log; then
              echo "Firebase Hosting preview already serves this exact version; treating no-op deploy as success."
              exit 0
            fi

            grep -v '^npm warn' firebase-deploy.log \
              | tail -n 120 \
              | perl -pe 's/\e\[[0-9;]*[mK]//g' \
              | sed -E 's/[A-Za-z0-9_\/+=-]{120,}/[redacted]/g' \
              > firebase-deploy-tail.log

            {
              echo "Firebase preview deploy failed. Last sanitized lines:"
              echo '```'
              cat firebase-deploy-tail.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            message=$(tr '\n' ' ' < firebase-deploy-tail.log | cut -c1-6000)
            echo "::error title=Firebase preview deploy failed::$message"
            exit "$status"
          fi
