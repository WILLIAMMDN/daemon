name: Deploy to Firebase Hosting on PR

on:
  pull_request:

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend-angular

      - name: Build frontend
        run: npm run build
        working-directory: frontend-angular

      - name: Configure Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DAEMON_A41F8 }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy preview to Firebase Hosting
        run: npx firebase-tools@latest hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project daemon-a41f8 --only estudiante --expires 7d --non-interactive
