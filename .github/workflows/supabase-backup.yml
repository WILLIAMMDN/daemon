name: Supabase Backup and Restore Drill

on:
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  database-backup:
    runs-on: ubuntu-latest
    environment: production
    container: postgres:17-bookworm
    services:
      restore-db:
        image: postgres:17-bookworm
        env:
          POSTGRES_DB: daemon_restore
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: restore-only
        options: >-
          --health-cmd "pg_isready -U postgres -d daemon_restore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      SUPABASE_BACKUP_DATABASE_URL: ${{ secrets.SUPABASE_BACKUP_DATABASE_URL }}
      PGPASSWORD: restore-only
    steps:
      - name: Validate backup secret
        run: test -n "$SUPABASE_BACKUP_DATABASE_URL"
      - name: Create PostgreSQL custom-format backup
        run: |
          mkdir -p backup
          pg_dump "$SUPABASE_BACKUP_DATABASE_URL" \
            --format=custom \
            --schema=public \
            --no-owner \
            --no-privileges \
            --file=backup/daemon-postgres.dump
      - name: Verify restore into isolated PostgreSQL
        run: |
          pg_restore \
            --host=restore-db \
            --username=postgres \
            --dbname=daemon_restore \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            --exit-on-error \
            backup/daemon-postgres.dump
          psql --host=restore-db --username=postgres --dbname=daemon_restore \
            --set=ON_ERROR_STOP=1 \
            --command="select count(*) >= 1 as schema_restored from information_schema.tables where table_schema = 'public';"
      - name: Generate checksum
        run: sha256sum backup/daemon-postgres.dump > backup/daemon-postgres.dump.sha256
      - name: Upload verified database backup
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: daemon-postgres-${{ github.run_id }}
          path: backup
          retention-days: 14
          if-no-files-found: error

  storage-backup:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SUPABASE_STORAGE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_STORAGE_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: sa-east-1
      ENDPOINT: https://lbxdcvsrmkkynttgwblc.storage.supabase.co/storage/v1/s3
    steps:
      - name: Validate storage secrets
        run: test -n "$AWS_ACCESS_KEY_ID" && test -n "$AWS_SECRET_ACCESS_KEY"
      - name: Verify preinstalled S3 client
        run: aws --version
      - name: Copy public and private storage buckets
        run: |
          mkdir -p backup/daemon-assets backup/daemon-private
          for bucket in daemon-assets daemon-private; do
            if aws s3api head-bucket --bucket "$bucket" --endpoint-url "$ENDPOINT" >/dev/null 2>&1; then
              aws s3 sync "s3://$bucket" "backup/$bucket" \
                --endpoint-url "$ENDPOINT" \
                --no-progress
            elif [ "$bucket" = "daemon-private" ]; then
              echo "Private bucket does not exist yet; recording an empty pre-migration snapshot."
              touch "backup/$bucket/.bucket-not-created"
            else
              echo "Required public bucket $bucket is not accessible."
              exit 1
            fi
          done
          tar -czf backup/daemon-storage.tar.gz -C backup daemon-assets daemon-private
          tar -tzf backup/daemon-storage.tar.gz >/dev/null
          sha256sum backup/daemon-storage.tar.gz > backup/daemon-storage.tar.gz.sha256
          rm -rf backup/daemon-assets backup/daemon-private
      - name: Upload verified storage backup
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: daemon-storage-${{ github.run_id }}
          path: backup
          retention-days: 14
          if-no-files-found: error
