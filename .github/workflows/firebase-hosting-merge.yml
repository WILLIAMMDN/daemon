name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend-angular

      - name: Build frontend
        run: npm run build
        working-directory: frontend-angular

      - name: Configure Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DAEMON_A41F8 }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          set +e
          npx firebase-tools@latest deploy --only hosting:estudiante --project daemon-a41f8 --non-interactive 2>&1 | tee firebase-deploy.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            if grep -q 'is the current active version' firebase-deploy.log; then
              echo "Firebase Hosting already serves this exact version; treating no-op deploy as success."
              exit 0
            fi

            grep -v '^npm warn' firebase-deploy.log \
              | tail -n 120 \
              | perl -pe 's/\e\[[0-9;]*[mK]//g' \
              | sed -E 's/[A-Za-z0-9_\/+=-]{120,}/[redacted]/g' \
              > firebase-deploy-tail.log

            {
              echo "Firebase deploy failed. Last sanitized lines:"
              echo '```'
              cat firebase-deploy-tail.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            message=$(tr '\n' ' ' < firebase-deploy-tail.log | cut -c1-6000)
            echo "::error title=Firebase deploy failed::$message"
            exit "$status"
          fi
