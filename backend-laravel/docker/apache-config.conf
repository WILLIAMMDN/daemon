# Configuracion de Apache para que Laravel funcione correctamente
# El DocumentRoot apunta a /public (que es donde esta index.php de Laravel)

<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Render expone su puerto en la variable $PORT, pero Apache escucha en 80
    # Si Render asigna otro puerto, el proxy de Render redirige a 80
</VirtualHost>